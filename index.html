<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="screen-orientation" content="landscape" />
    <meta name="x5-orientation" content="landscape" />
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <link rel="icon" href="/images/blog.png" type="image/png" />
    <title>3D简历 - 黄凯</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; }
    </style>
    <script>
      async function lockLandscape() {
        if (screen.orientation && screen.orientation.lock) {
          try {
            await screen.orientation.lock('landscape')
          } catch (e) {
            console.log('Lock landscape failed:', e)
          }
        }
      }

      // First user interaction: try lock + rotate to landscape
      function handleFirstInteraction() {
        lockLandscape()
        // Emit custom event for app to rotate
        window.dispatchEvent(new CustomEvent('landscape-init'))
      }

      document.addEventListener('click', handleFirstInteraction, { once: true })
      document.addEventListener('touchstart', handleFirstInteraction, { once: true })
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
